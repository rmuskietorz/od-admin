# fail2ban Filter fuer od-admin Login-Failures.
# Liest /var/log/nginx/od-admin.access.log und matcht POST /admin/login mit 401/403.
#
# Installation:
#   sudo cp deploy/fail2ban/od-admin.filter.conf /etc/fail2ban/filter.d/od-admin.conf
#   sudo cp deploy/fail2ban/od-admin.jail.conf   /etc/fail2ban/jail.d/od-admin.conf
#   sudo systemctl restart fail2ban
#
# Test:
#   sudo fail2ban-regex /var/log/nginx/od-admin.access.log /etc/fail2ban/filter.d/od-admin.conf

[Definition]

# nginx-Log-Format: $remote_addr - $remote_user [$time_local] "$request" $status ...
# Wiederholte POSTs auf /admin/login matchen. Symfony liefert bei fehlge-
# schlagenem Form-Login 302 (Redirect zurueck), bei Throttling 429 — daher 302
# mitnehmen, sonst greift fail2ban erst nach Symfonys eigenem Throttle. Bei
# maxretry=5/600s unkritisch (kein normaler Nutzer postet 5x Login in 10 min).
failregex = ^<HOST>\s.*"POST /login[^"]*" (302|401|403|429)

ignoreregex =
