# Jail-Konfiguration: nach 5 Treffern in 10min -> 1h Ban via iptables.
# Pfad zur jail.d kopieren, siehe od-admin.filter.conf.

[od-admin]
enabled  = true
port     = http,https
filter   = od-admin
logpath  = /var/log/nginx/od-admin.access.log
maxretry = 5
findtime = 600
bantime  = 3600
action   = iptables-multiport[name=od-admin, port="http,https", protocol=tcp]
