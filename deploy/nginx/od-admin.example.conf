# nginx Host-vHost vor od-admin — bedient BEIDE Subdomains (Open Design + Admin).
# Der Container-nginx trennt intern nach Host (open-design.* = OD-Proxy,
# admin.* = Dashboard). Hier also nur TLS-Termination + Proxy zu od-admin.
#
# Platzhalter werden vom helper.sh ersetzt:
#   __SERVER_NAMES__   -> "open-design.robmus.de admin.open-design.robmus.de"
#   __OD_ADMIN_PORT__  -> veroeffentlichter Host-Port von od-admin (z.B. 8086)

upstream od_admin {
    server 127.0.0.1:__OD_ADMIN_PORT__;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAMES__;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __SERVER_NAMES__;

    # certbot ergaenzt ssl_certificate/-key + options-ssl-nginx automatisch.

    client_max_body_size 200m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    access_log /var/log/nginx/od-admin.access.log;
    error_log  /var/log/nginx/od-admin.error.log warn;

    proxy_buffering off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    location / {
        proxy_pass http://od_admin;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        # Ohne X-Forwarded-Port baut Symfony absolute URLs mit dem internen
        # Container-Port -> kaputter Redirect. 443 erzwingen (TLS-Termination hier).
        proxy_set_header X-Forwarded-Port  443;
    }

    # WebSocket-Upgrade fuer das ttyd-Terminal (liegt auf der admin-Subdomain).
    location /ttyd/ {
        proxy_pass http://od_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  443;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }
}
