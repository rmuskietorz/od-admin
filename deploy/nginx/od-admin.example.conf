# nginx vHost fuer od-admin (vor dem Container).
# Annahmen:
#   - od-admin Container haengt auf 127.0.0.1:8080 (siehe compose.yml)
#   - Domain z.B. admin.example.com mit Let's Encrypt
#   - od-admin macht selbst die User-Auth, hier nur TLS-Termination + Security-Header

upstream od_admin {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.example.com;

    # certbot ergaenzt automatisch:
    # ssl_certificate     /etc/letsencrypt/live/admin.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/admin.example.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 200m;

    # Security-Header
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Logs (werden von fail2ban gelesen)
    access_log /var/log/nginx/od-admin.access.log;
    error_log  /var/log/nginx/od-admin.error.log warn;

    # SSE braucht keine Buffer + lange Timeouts
    proxy_buffering off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    location / {
        proxy_pass http://od_admin;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # WebSocket-Upgrade fuer ttyd-Terminal
    location /admin/ttyd/ {
        proxy_pass http://od_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }
}
