name: od-admin

# Komplettes Setup: od-admin + ttyd + Open Design + Watchtower.
# Annahme: dieser Compose laeuft auf dem Server in /opt/od-admin/.
# Der OD-Compose (.../open-design/deploy/docker-compose.claude-cli.server.yml)
# wird HIER mitinkludiert, damit alles in einem Netz haengt.

services:
  od-admin:
    container_name: od-admin
    build:
      context: .
      dockerfile: Dockerfile
    # Lokal kein Auto-Restart (Default "no"). Auf dem Prod-Server
    # OD_ADMIN_RESTART=unless-stopped setzen (Shell-Env / systemd / Deploy).
    restart: ${OD_ADMIN_RESTART:-no}
    env_file:
      - .env
      - .env.local
    networks:
      - od-net
    ports:
      - "${OD_ADMIN_BIND:-127.0.0.1}:${OD_ADMIN_PORT:-8082}:8080"
    volumes:
      # Persistent: SQLite User-DB
      - od_admin_data:/var/www/html/var/data
      # Docker-Socket (Read-Write – PHP braucht POST fuer exec/restart)
      - /var/run/docker.sock:/var/run/docker.sock
      # OD-Compose-File read-only mit reingeben, damit der DockerClient
      # 'docker compose -f ... restart' fahren kann.
      - ${HOST_OD_DEPLOY_DIR:-/opt/open-design/deploy}:/host/open-design:ro
    tmpfs:
      - /tmp
      - /var/cache
      # nginx schreibt Logs, Pid, Client-Body-Buffers – braucht uid=1000.
      - /var/log/nginx:uid=1000,gid=1000,mode=755
      - /run/nginx:uid=1000,gid=1000,mode=755
      - /var/lib/nginx/tmp:uid=1000,gid=1000,mode=755
      # Symfony schreibt Cache + Logs zur Laufzeit – muss tmpfs sein wenn
      # der Root-FS read-only ist. uid=1000 damit PHP-FPM reinschreiben kann.
      - /var/www/html/var/cache:uid=1000,gid=1000,mode=755
      - /var/www/html/var/log:uid=1000,gid=1000,mode=755
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    # uid 1000 muss den gemounteten Docker-Socket lesen duerfen. cap_add
    # DAC_OVERRIDE greift fuer Nicht-root nicht zuverlaessig -> die GID der
    # Socket-Gruppe ergaenzen. DOCKER_GID setzt die Einrichtung (helper.sh 86)
    # automatisch aus `stat -c %g /var/run/docker.sock`.
    group_add:
      - "${DOCKER_GID:-999}"
    mem_limit: 256m
    pids_limit: 128
    depends_on:
      - ttyd
    labels:
      com.centurylinklabs.watchtower.enable: "false"  # selbst gebaut, nicht auto-update
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - "wget -qO- http://127.0.0.1:8080/admin/login >/dev/null || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  ttyd:
    container_name: od-admin-ttyd
    # Eigenes Image: tsl0922/ttyd + docker-cli (siehe docker/Dockerfile.ttyd).
    build:
      context: .
      dockerfile: docker/Dockerfile.ttyd
    restart: ${OD_ADMIN_RESTART:-no}
    networks:
      - od-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Auth wird durch nginx auth_request davor sichergestellt; ttyd selbst
    # ist nicht aus dem Internet erreichbar (kein ports:-Mapping).
    command:
      - ttyd
      - --port=7681
      - --interface=0.0.0.0
      - --writable
      - docker
      - exec
      - -it
      - -e
      - TERM=xterm-256color
      - -u
      - open-design
      - open-design-claude
      - bash
      - -lc
      # Login starten; danach IMMER in eine Shell fallen (nie schwarz/tot).
      # So ist sichtbar, ob ttyd rendert, und 'claude setup-token' ist
      # jederzeit erneut aufrufbar.
      - "clear; claude setup-token || claude /login || true; echo; echo '── claude setup-token zum Wiederholen eintippen ──'; exec bash -l"
    mem_limit: 64m
    pids_limit: 64
    security_opt:
      - no-new-privileges:true

networks:
  od-net:
    name: od-net
    external: true  # wird vom OD-Compose angelegt; wir haengen uns ran

volumes:
  od_admin_data:
