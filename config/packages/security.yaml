security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: bcrypt
            cost: 13

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # WICHTIG: /_auth_check hat KEINE eigene Firewall. Es laeuft bewusst
        # unter der 'admin'-Firewall, damit es denselben Session-Token sieht
        # wie das Admin-Login. Eine separate Firewall mit security:false hatte
        # nie einen Auth-Kontext -> isGranted() war immer false -> der nginx
        # auth_request lieferte immer 401 und der OD-Reverse-Proxy unter / war
        # fuer niemanden erreichbar. (siehe SecurityController::authCheck)
        admin:
            lazy: true
            provider: app_user_provider
            entry_point: form_login
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard
                enable_csrf: true
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                # Eigener Name (kollidiert nicht mit anderen robmus.de-Apps) und
                # Domain auf open-design.robmus.de -> Cookie nur an OD + Admin-
                # Subdomain, nicht an andere robmus.de-Seiten (SSO ohne Leak).
                name: OD_REMEMBERME
                lifetime: 604800   # 1 Woche
                path: /
                domain: '%env(default::COOKIE_DOMAIN)%'
            # Brute-Force-Schutz: nach 5 Fehlversuchen pro IP+Username 1 min
            # sperren, dann Token-Bucket-Backoff. Symfony 7 built-in.
            login_throttling:
                max_attempts: 5
                interval: '1 minute'

    access_control:
        - { path: ^/login$,       roles: PUBLIC_ACCESS }
        - { path: ^/_auth_check$, roles: PUBLIC_ACCESS }
        - { path: ^/,             roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
