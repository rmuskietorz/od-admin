security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: bcrypt
            cost: 13

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Auth-Check Endpoint (nginx subrequest). Liefert 200 wenn eingeloggt,
        # 401 sonst. Wird vor jedem proxied Request gefragt.
        auth_check:
            pattern: ^/_auth_check$
            stateless: false
            security: false

        admin:
            lazy: true
            provider: app_user_provider
            entry_point: form_login
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard
                enable_csrf: true
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800   # 1 Woche
                path: /admin
            # Brute-Force-Schutz: nach 5 Fehlversuchen pro IP+Username 1 min
            # sperren, dann Token-Bucket-Backoff. Symfony 7 built-in.
            login_throttling:
                max_attempts: 5
                interval: '1 minute'

    access_control:
        - { path: ^/admin/login$,  roles: PUBLIC_ACCESS }
        - { path: ^/_auth_check$,  roles: PUBLIC_ACCESS }
        - { path: ^/admin,         roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
