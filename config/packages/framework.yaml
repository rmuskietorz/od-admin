framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true

    trusted_hosts: '%env(default::TRUSTED_HOSTS)%'
    trusted_proxies: '%env(default::TRUSTED_PROXIES)%'
    trusted_headers: [ 'x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port', 'x-forwarded-prefix' ]

    session:
        handler_id: null
        # Sessions ins persistente var/data-Volume (Default waere tmpfs -> bei
        # jedem Container-Neustart ausgeloggt). Verzeichnis legt entrypoint.sh an.
        save_path: '%kernel.project_dir%/var/data/sessions'
        # Eigener Cookie-Name (kein Clash mit anderen robmus.de-Apps) + Domain
        # auf open-design.robmus.de -> SSO zwischen OD und Admin-Subdomain,
        # ohne das Cookie an andere robmus.de-Seiten zu senden. Leer = host-only.
        name: OD_SESSION
        cookie_domain: '%env(default::COOKIE_DOMAIN)%'
        cookie_secure: auto
        cookie_samesite: lax
        cookie_path: '%env(default::COOKIE_PATH)%'
        storage_factory_id: session.storage.factory.native

    php_errors:
        log: true

when@dev:
    framework:
        profiler: { only_exceptions: false }
        session:
            cookie_secure: false

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
