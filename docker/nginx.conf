worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;
daemon off;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 200m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Docker embedded DNS – lazy resolve fuer proxy_pass mit Variable.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Open Design (Default-Host, z.B. open-design.robmus.de) ──────────────────
    # Alles unter / ist der OD-Reverse-Proxy hinterm Auth-Gate. Der Admin liegt
    # auf der Subdomain admin.<host> (eigener Server-Block unten).
    server {
        listen 8080 default_server;
        server_name _;
        root /var/www/html/public;
        index index.php;

        absolute_redirect off;
        port_in_redirect off;

        # Health-Endpoint (kein Symfony, keine Auth, kein trusted_hosts).
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Symfony Auth-Check fuer auth_request.
        location = /_auth_check {
            internal;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
            fastcgi_param SCRIPT_NAME /index.php;
            fastcgi_param REQUEST_URI /_auth_check;
            fastcgi_param REQUEST_METHOD GET;
            fastcgi_param CONTENT_LENGTH "";
            fastcgi_param HTTPS $https if_not_empty;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_pass_request_body off;
        }

        # Nicht eingeloggt -> zur Admin-Subdomain (admin.<host>) zum Login.
        location @login_redirect {
            return 302 https://admin.$host/login;
        }

        location ~ ^/index\.php(/|$) {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_param HTTPS $https if_not_empty;
            internal;
        }

        # OD-Reverse-Proxy + schwebender "Admin"-Button injiziert.
        location / {
            auth_request /_auth_check;
            error_page 401 = @login_redirect;
            error_page 502 503 504 = @od_unreachable;

            set $od_upstream "open-design-claude:7456";
            proxy_pass http://$od_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            # Accept-Encoding leeren, sonst kommt gzip und sub_filter greift nicht.
            proxy_set_header Accept-Encoding "";

            proxy_buffering off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            proxy_intercept_errors on;

            # "⚙ Admin"-Link in jede OD-HTML-Seite einblenden (ohne die OD-App
            # anzufassen). admin.$host = admin.open-design.robmus.de.
            sub_filter_once on;
            sub_filter_types text/html;
            sub_filter '</body>' '<a href="https://admin.$host/" title="Admin-Bereich" style="position:fixed;bottom:20px;right:20px;z-index:2147483647;display:inline-flex;align-items:center;gap:7px;background:#138c81;color:#ffffff;font:700 15px/1 system-ui,-apple-system,sans-serif;padding:12px 20px;border-radius:12px;text-decoration:none;box-shadow:0 8px 26px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2)"><span style="font-size:17px">&#9881;</span> Admin</a></body>';
        }

        location @od_unreachable {
            default_type text/html;
            return 503 '<!doctype html><meta charset="utf-8"><title>Open Design nicht erreichbar</title><style>body{font-family:system-ui;background:#0d3047;color:#dbd6ca;padding:40px;max-width:640px;margin:0 auto;}h1{color:#1db1a3;}a{color:#287fd9;}</style><h1>Open Design ist gerade nicht erreichbar</h1><p>Der OD-Container laeuft nicht oder ist nicht im Docker-Netz <code>od-net</code>.</p><p><a href="https://admin.$host/">&larr; Zum Admin-Panel</a></p>';
        }
    }

    # ── Admin-Dashboard (admin.<host>, z.B. admin.open-design.robmus.de) ────────
    server {
        listen 8080;
        server_name admin.*;
        root /var/www/html/public;
        index index.php;

        absolute_redirect off;
        port_in_redirect off;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location = /_auth_check {
            internal;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
            fastcgi_param SCRIPT_NAME /index.php;
            fastcgi_param REQUEST_URI /_auth_check;
            fastcgi_param REQUEST_METHOD GET;
            fastcgi_param CONTENT_LENGTH "";
            fastcgi_param HTTPS $https if_not_empty;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_pass_request_body off;
        }

        location @login_redirect {
            return 302 /login;
        }

        location ~ ^/index\.php(/|$) {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_param HTTPS $https if_not_empty;
            internal;
        }

        # Claude-Login-Terminal (ttyd), per auth_request geschuetzt.
        location ^~ /ttyd/ {
            auth_request /_auth_check;
            error_page 401 = @login_redirect;

            set $ttyd_upstream "ttyd:7681";
            rewrite ^/ttyd/(.*)$ /$1 break;

            proxy_pass http://$ttyd_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 1d;
            proxy_send_timeout 1d;
            proxy_buffering off;
        }

        # Dashboard + alle Symfony-Routen (/, /login, /audit, /claude/*, /status …).
        location / {
            try_files $uri /index.php$is_args$args;
        }
    }
}
