worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;
daemon off;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 200m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Docker embedded DNS. Wichtig: damit proxy_pass mit Variable lazy
    # resolved – open-design-claude muss zur Startup-Zeit NICHT existieren.
    # Sonst crasht nginx beim Boot mit "host not found in upstream".
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 8080 default_server;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Hinter TLS-Proxy: nginx-eigene Redirects (z.B. error_page 401 ->
        # @login_redirect) NICHT absolut mit Container-Port/Schema bauen, sonst
        # entsteht http://host:8080/... -> Mixed Content im https-iframe (ttyd).
        absolute_redirect off;
        port_in_redirect off;

        # ── Symfony Admin-Routen ────────────────────────────────────────────
        location ^~ /admin/ttyd/ {
            auth_request /_auth_check;
            error_page 401 = @login_redirect;

            # set MUSS vor dem rewrite ... break stehen: `break` beendet die
            # Rewrite-Phase, in der auch `set` ausgewertet wird. Andernfalls
            # bleibt $ttyd_upstream leer -> proxy_pass http:// -> 500.
            set $ttyd_upstream "ttyd:7681";
            rewrite ^/admin/ttyd/(.*)$ /$1 break;

            proxy_pass http://$ttyd_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 1d;
            proxy_send_timeout 1d;
            proxy_buffering off;
        }

        location /admin {
            try_files $uri /index.php$is_args$args;
        }

        location ~ ^/admin/.+\.php(/|$) {
            return 404;
        }

        # ── Auth-Check fuer nginx auth_request ──────────────────────────────
        location = /_auth_check {
            internal;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
            fastcgi_param SCRIPT_NAME /index.php;
            fastcgi_param REQUEST_URI /_auth_check;
            fastcgi_param REQUEST_METHOD GET;
            fastcgi_param CONTENT_LENGTH "";
            fastcgi_param HTTPS $https if_not_empty;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_pass_request_body off;
        }

        location @login_redirect {
            return 302 /admin/login;
        }

        # ── Symfony PHP-FPM Handler ─────────────────────────────────────────
        location ~ ^/index\.php(/|$) {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_param HTTPS $https if_not_empty;
            internal;
        }

        # ── Open Design Reverse-Proxy (alles andere) ───────────────────────
        location / {
            auth_request /_auth_check;
            error_page 401 = @login_redirect;
            error_page 502 503 504 = @od_unreachable;

            set $od_upstream "open-design-claude:7456";
            proxy_pass http://$od_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;

            # Falls OD-Container nicht laeuft, nicht crashen – freundliche
            # Fehlermeldung statt nackter 502.
            proxy_intercept_errors on;
        }

        location @od_unreachable {
            default_type text/html;
            return 503 '<!doctype html><meta charset="utf-8"><title>Open Design nicht erreichbar</title><style>body{font-family:system-ui;background:#0d3047;color:#dbd6ca;padding:40px;max-width:640px;margin:0 auto;}h1{color:#1db1a3;}a{color:#287fd9;}</style><h1>Open Design ist gerade nicht erreichbar</h1><p>Der OD-Container laeuft nicht oder ist nicht im Docker-Netz <code>od-net</code>.</p><p><a href="/admin">&larr; Zum Admin-Panel</a></p>';
        }
    }
}
