worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;
daemon off;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 200m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    upstream phpfpm {
        server 127.0.0.1:9000;
    }

    # OD-Daemon im selben Docker-Netz
    upstream open_design {
        server open-design-claude:7456;
        keepalive 16;
    }

    # ttyd Sidecar fuer Claude-Login Terminal
    upstream ttyd {
        server ttyd:7681;
    }

    server {
        listen 8080 default_server;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # ── Symfony Admin-Routen ────────────────────────────────────────────
        location ^~ /admin/ttyd/ {
            # Auth-Check via Subrequest
            auth_request /_auth_check;
            error_page 401 = @login_redirect;

            # ttyd-Pfad rewriten: /admin/ttyd/foo -> /foo
            rewrite ^/admin/ttyd/(.*)$ /$1 break;
            proxy_pass http://ttyd;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 1d;
            proxy_send_timeout 1d;
            proxy_buffering off;
        }

        location /admin {
            try_files $uri /index.php$is_args$args;
        }

        location ~ ^/admin/.+\.php(/|$) {
            return 404;
        }

        # ── Auth-Check fuer nginx auth_request ──────────────────────────────
        location = /_auth_check {
            internal;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
            fastcgi_param SCRIPT_NAME /index.php;
            fastcgi_param REQUEST_URI /_auth_check;
            fastcgi_param REQUEST_METHOD GET;
            fastcgi_param CONTENT_LENGTH "";
            fastcgi_param HTTPS $https if_not_empty;
            fastcgi_pass phpfpm;
            fastcgi_pass_request_body off;
        }

        location @login_redirect {
            return 302 /admin/login;
        }

        # ── Symfony PHP-FPM Handler ─────────────────────────────────────────
        location ~ ^/index\.php(/|$) {
            fastcgi_pass phpfpm;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_param HTTPS $https if_not_empty;
            internal;
        }

        # ── Open Design Reverse-Proxy (alles andere) ───────────────────────
        location / {
            auth_request /_auth_check;
            error_page 401 = @login_redirect;

            proxy_pass http://open_design;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # SSE / Streaming
            proxy_buffering off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
        }
    }
}
